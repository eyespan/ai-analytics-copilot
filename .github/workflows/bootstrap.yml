name: Bootstrap AWS OIDC

on:

  workflow_dispatch:

  push:
    branches:
      - level7
    paths:
      - ".github/workflows/bootstrap.yml"
  


permissions:

  contents: read


env:

  AWS_REGION: us-east-1

  PROJECT_NAME: ai-analytics-copilot

  ROLE_NAME: ai-analytics-copilot-github-actions


jobs:


  bootstrap:


    name: Create GitHub Actions IAM Role

    runs-on: ubuntu-latest


    steps:


      - name: Checkout repository

        uses: actions/checkout@v4



      - name: Configure AWS credentials

        uses: aws-actions/configure-aws-credentials@v4

        with:

          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}

          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          aws-region: ${{ env.AWS_REGION }}



      - name: Validate AWS access

        run: |

          aws sts get-caller-identity



      - name: Create GitHub OIDC Provider

        shell: bash

        run: |

          set -e


          ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}


          OIDC_PROVIDER="arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com"


          if aws iam get-open-id-connect-provider \
             --open-id-connect-provider-arn "$OIDC_PROVIDER" >/dev/null 2>&1

          then

            echo "GitHub OIDC provider already exists"

          else

            echo "Creating GitHub OIDC provider"


            aws iam create-open-id-connect-provider \
              --url https://token.actions.githubusercontent.com \
              --client-id-list sts.amazonaws.com \
              --thumbprint-list 6938fd4d98bab03faadb97b34396831e3780aea1

          fi




      - name: Create GitHub Actions IAM Role

        shell: bash

        run: |

          set -e

          ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}

          cat > trust-policy.json <<EOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Federated": "arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"

                  },
                  "StringLike": {
                    "token.actions.githubusercontent.com:sub": "repo:${{ github.repository }}:*"
                  }
                }
              }
            ]
          }
          EOF



          if aws iam get-role \
             --role-name "${ROLE_NAME}" >/dev/null 2>&1

          then

            echo "IAM role already exists"

          else

            echo "Creating IAM role"


            aws iam create-role \
              --role-name "${ROLE_NAME}" \
              --assume-role-policy-document file://trust-policy.json

          fi




      - name: Attach Terraform permissions

        run: |


          aws iam attach-role-policy \
            --role-name "${ROLE_NAME}" \
            --policy-arn arn:aws:iam::aws:policy/AdministratorAccess




      - name: Get Role ARN

        id: role

        shell: bash

        run: |


          ROLE_ARN=$(aws iam get-role \
          --role-name "${ROLE_NAME}" \
          --query 'Role.Arn' \
          --output text)

          echo "ROLE_ARN=${ROLE_ARN}" >> $GITHUB_OUTPUT

          echo "Created role:"

          echo "${ROLE_ARN}"




      - name: Create GitHub Terraform Role Secret

        if: success()

        env:

          GH_TOKEN: ${{ secrets.GH_TOKEN }}

        shell: bash

        run: |


          ROLE_ARN="${{ steps.role.outputs.ROLE_ARN }}"

          gh secret set AWS_TERRAFORM_ROLE_ARN \
            --body "${ROLE_ARN}"



      - name: Bootstrap complete

        run: |


          echo "==================================="

          echo "Bootstrap completed"

          echo "GitHub Actions Role:"

          echo "${{ steps.role.outputs.ROLE_ARN }}"

          echo "==================================="