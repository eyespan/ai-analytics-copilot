name: Bootstrap AWS OIDC

on:
  workflow_dispatch:

  push:
    branches:
      - level7
    paths:
      - ".github/workflows/bootstrap.yml"
  


permissions:
  contents: read
  actions: write


env:
  AWS_REGION: us-east-1
  PROJECT_NAME: ai-analytics-copilot
  ROLE_NAME: ai-analytics-copilot-github-actions
  TF_STATE_BUCKET: ai-analytics-copilot-terraform-state


jobs:
  bootstrap:
    name: Create GitHub Actions IAM Role
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          
      - name: Validate AWS access
        run: |
          aws sts get-caller-identity

      - name: Create GitHub OIDC Provider
        shell: bash
        run: |
          set -e
          ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          OIDC_PROVIDER="arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com"

          if aws iam get-open-id-connect-provider \
             --open-id-connect-provider-arn "$OIDC_PROVIDER" >/dev/null 2>&1

          then

            echo "GitHub OIDC provider already exists"

          else

            echo "Creating GitHub OIDC provider"

            aws iam create-open-id-connect-provider \
              --url https://token.actions.githubusercontent.com \
              --client-id-list sts.amazonaws.com \
              --thumbprint-list 6938fd4d98bab03faadb97b34396831e3780aea1

          fi


      - name: Create GitHub Actions IAM Role
        shell: bash
        run: |
          set -e
          ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}

          cat > trust-policy.json <<EOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Federated": "arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"

                  },
                  "StringLike": {
                    "token.actions.githubusercontent.com:sub": "repo:${{ github.repository }}:*"
                  }
                }
              }
            ]
          }
          EOF



          if aws iam get-role \
             --role-name "${ROLE_NAME}" >/dev/null 2>&1

          then

            echo "IAM role already exists"

          else

            echo "Creating IAM role"


            aws iam create-role \
              --role-name "${ROLE_NAME}" \
              --assume-role-policy-document file://trust-policy.json

          fi




      - name: Attach Terraform permissions

        run: |


          aws iam attach-role-policy \
            --role-name "${ROLE_NAME}" \
            --policy-arn arn:aws:iam::aws:policy/AdministratorAccess




      - name: Get Role ARN

        id: role

        shell: bash

        run: |


          ROLE_ARN=$(aws iam get-role \
          --role-name "${ROLE_NAME}" \
          --query 'Role.Arn' \
          --output text)

          echo "ROLE_ARN=${ROLE_ARN}" >> $GITHUB_OUTPUT

          echo "Created role:"

          echo "${ROLE_ARN}"

    
      - name: Create Terraform State S3 Bucket
        shell: bash
        run: |

          set -e

          BUCKET_NAME="${TF_STATE_BUCKET}"


          if aws s3api head-bucket \
             --bucket "${BUCKET_NAME}" 2>/dev/null

          then

            echo "Terraform state bucket already exists"

          else

            echo "Creating Terraform state bucket"


            aws s3api create-bucket \
              --bucket "${BUCKET_NAME}" \
              --region "${AWS_REGION}"

          fi

      - name: Enable Terraform State Versioning
        run: |

          aws s3api put-bucket-versioning \
            --bucket "${TF_STATE_BUCKET}" \
            --versioning-configuration Status=Enabled

      - name: Enable Terraform State Encryption
        shell: bash
        run: |

          cat > encryption.json <<EOF
          {
            "Rules": [
              {
                "ApplyServerSideEncryptionByDefault": {
                  "SSEAlgorithm": "AES256"
                }
              }
            ]
          }
          EOF

          aws s3api put-bucket-encryption \
            --bucket "${TF_STATE_BUCKET}" \
            --server-side-encryption-configuration file://encryption.json

      - name: Block Public Access
       run: |

          aws s3api put-public-access-block \
            --bucket "${TF_STATE_BUCKET}" \
            --public-access-block-configuration \
              BlockPublicAcls=true,\
              IgnorePublicAcls=true,\
              BlockPublicPolicy=true,\
              RestrictPublicBuckets=true

      - name: Bootstrap complete

        run: |


          echo "==================================="

          echo "Bootstrap completed"

          echo "GitHub Actions Role:"

          echo "${{ steps.role.outputs.ROLE_ARN }}"

          echo "==================================="