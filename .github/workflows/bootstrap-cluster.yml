name: Bootstrap Kubernetes Platform


on:

  workflow_dispatch:

 
jobs:


  ingress-nginx:

    uses: ./.github/workflows/helm-deploy.yml

    with:

      service: ingress-nginx

      namespace: ingress-nginx

      chart: ingress-nginx

      repository: https://kubernetes.github.io/ingress-nginx

      values: helm/values/ingress-nginx.yaml

      wait_for_ready: "true"


    secrets: inherit


  metrics-server:

    uses: ./.github/workflows/helm-deploy.yml

    with:

      service: metrics-server

      namespace: kube-system

      chart: metrics-server

      repository: https://kubernetes-sigs.github.io/metrics-server/

    secrets: inherit

  
  deploy-aws-load-balancer-controller:

    uses: ./.github/workflows/helm-deploy.yml

    with:

      service: aws-load-balancer-controller

      namespace: kube-system

      chart: aws-load-balancer-controller

      repository: https://aws.github.io/eks-charts

      extra_values: >
        --set clusterName=ai-analytics-copilot
        --set vpcId=${{ needs.terraform-apply.outputs.vpc_id }}
        --set serviceAccount.create=true
        --set serviceAccount.name=aws-load-balancer-controller
       
    secrets: inherit

  
  deploy-prometheus:

    uses: ./.github/workflows/helm-deploy.yml

    with:

      service: prometheus

      namespace: monitoring

      chart: kube-prometheus-stack

      repository: https://prometheus-community.github.io/helm-charts

      extra_values: >
        --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false

    secrets: inherit