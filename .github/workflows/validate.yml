name: Validate Repository

on:

  pull_request:

    branches:
      - main
      - level7

  push:

    branches:
      - level7

  workflow_dispatch:

permissions:

  contents: read

jobs:

  validate:

    name: Repository Validation

    runs-on: ubuntu-latest

    defaults:

      run:

        shell: bash

    steps:

      ##########################################################
      # Checkout
      ##########################################################

      - name: Checkout Repository

        uses: actions/checkout@v4

      ##########################################################
      # Python
      ##########################################################

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"

      - name: Install Python Validation Tools

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements-dev.txt

      ##########################################################
      # Terraform
      ##########################################################

      - name: Setup Terraform

        uses: hashicorp/setup-terraform@v3

        with:

          terraform_wrapper: false

      - name: Terraform Format Check

        run: |

          terraform fmt \
            -recursive \
            -check

      - name: Terraform Init

        working-directory: terraform/environments/dev

        run: terraform init -backend=false

      - name: Terraform Validate

        working-directory: terraform/environments/dev

        run: terraform validate

      ##########################################################
      # Helm
      ##########################################################

      - name: Install Helm

        uses: azure/setup-helm@v4

      - name: Helm Lint

        run: |

          for chart in helm/*; do

            if [ -d "$chart" ]; then

              echo "Linting $chart"

              helm lint "$chart"

            fi

          done

      ##########################################################
      # Kubernetes YAML Validation
      ##########################################################

      - name: Install kubeconform

        run: |

          curl -L \
          https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
          | tar xz

          sudo mv kubeconform /usr/local/bin/

      - name: Validate Kubernetes Manifests

        run: |

          manifests=$(find kubernetes \
            \( -name "*.yaml" -o -name "*.yml" \))

          if [ -z "$manifests" ]; then

            echo "No Kubernetes manifests found. Skipping validation."

            exit 0

          fi


          echo "$manifests" | xargs kubeconform -summary

      ##########################################################
      # Dockerfiles
      ##########################################################

      - name: Validate Dockerfiles
        run: |
          set -uo pipefail
          dockerfiles=$(find . -name Dockerfile)
          failed=0
      
          for file in $dockerfiles; do
            if [ ! -s "$file" ]; then
              echo "Skipping empty Dockerfile: $file"
              continue
            fi
      
            echo "Checking $file"
            if ! docker run --rm -i hadolint/hadolint hadolint --failure-threshold error - < "$file"; then
              echo "FAILED: $file"
              failed=1
            fi
          done
      
          if [ "$failed" -eq 1 ]; then
            echo "One or more Dockerfiles failed validation"
            exit 1
          fi

      ##########################################################
      # Python Formatting
      ##########################################################

      - name: isort

        run: |

          isort \
            --check-only \
            .

      - name: Black

        run: |

          black \
            --check \
            .

      - name: flake8

        run: |

          flake8 --version

          flake8 .

      ##########################################################
      # Unit Tests
      ##########################################################

      - name: Run Unit Tests

        run: |

          pytest tests/unit

      ##########################################################
      # Success
      ##########################################################

      - name: Validation Complete

        run: |

          echo "Repository validation completed successfully."