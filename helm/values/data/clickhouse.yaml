global:
  security:
    allowInsecureImages: true


replicaCount: 1

image:
  repository: clickhouse/clickhouse-server
  tag: "25.3"

auth:
  username: admin
  password: admin123
  database: github

persistence:
  enabled: true
  storageClass: gp3
  size: 50Gi

resources:
