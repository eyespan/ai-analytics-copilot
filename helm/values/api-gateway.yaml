namespace: ai-analytics

name: api-gateway

image:
  name: api-gateway
  tag: v1.0.0
  pullPolicy: Always

replicaCount: 2

containerPort: 8000

service:
  port: 80

resources:

  requests:
    cpu: 250m
    memory: 512Mi

  limits:
    cpu: 1
    memory: 2Gi

ingress:

  enabled: true

  path: /api