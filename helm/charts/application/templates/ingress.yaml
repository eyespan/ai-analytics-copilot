{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1

kind: Ingress

metadata:

  name: {{ .Values.name }}

  {{- if .Values.ingress.rewrite }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
  {{- end }}

spec:

  ingressClassName: nginx

  rules:

  - http:

      paths:

      - path: {{ if .Values.ingress.rewrite }}{{ .Values.ingress.path }}(/|$)(.*){{ else }}{{ .Values.ingress.path }}{{ end }}

        pathType: {{ if .Values.ingress.rewrite }}ImplementationSpecific{{ else }}Prefix{{ end }}

        backend:

          service:

            name: {{ .Values.name }}

            port:

              number: {{ .Values.service.port }}

{{- end }}