[tool.black]
line-length = 100
target-version = ["py312"]

exclude = '''
/(
    \.git
  | \.terraform
  | \.venv
  | __pycache__
  | build
  | dist
)/
'''


[tool.isort]
profile = "black"
line_length = 100
py_version = 312

skip = [
    ".terraform",
    ".venv",
    "build",
    "dist"
]

[tool.flake8]
max-line-length = 100

extend-ignore = [
    "E203",
    "W503"
]

exclude = [
    ".git",
    ".terraform",
    ".venv",
    "__pycache__",
    "build",
    "dist"
]